version: 3
output: prefixed
includes:
  viewer:
    taskfile: ../frontend/viewer/Taskfile.yml
    dir: ../frontend/viewer
tasks:
  install:
    method: checksum
    sources:
      - package.json
      - package-lock.json
    cmds:
      # platform.bible does not support pnpm
      - npm install

  package:
    deps: [build-fw-lite, install]
    cmds:
      - npm run package

  run:
    deps: [build-fw-lite, install]
    cmds:
      - npm run start

  build-fw-lite:
    deps: [build-viewer]
    cmds:
      # Publish both RIDs so one extension package runs on Windows and Linux.
      - dotnet publish ../backend/FwLite/FwLiteWeb/FwLiteWeb.csproj --configuration Release --sc -r win-x64 --output ./public/fw-lite/win-x64
      - dotnet publish ../backend/FwLite/FwLiteWeb/FwLiteWeb.csproj --configuration Release --sc -r linux-x64 --output ./public/fw-lite/linux-x64
  build-viewer:
    deps: [viewer:build]
