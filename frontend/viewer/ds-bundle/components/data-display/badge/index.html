<!-- @dsCard group="Data Display" name="Badge" subtitle="default · secondary · destructive · outline" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FW Lite — Badge</title>
<link rel="stylesheet" href="../../../styles.css">
<style>
  html, body { margin: 0; }
  .board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: color-mix(in oklab, var(--border) 70%, transparent); min-height: 100%; }
  @media (max-width: 720px) { .board { grid-template-columns: 1fr; } }
  .pane { position: relative; padding: 2rem 1.75rem; }
  .pane-tag { position: absolute; top: .6rem; right: .75rem; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; opacity: .5; }
  .row { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: .9rem; }
  .cap { font-size: 11px; opacity: .55; margin: 0 0 .35rem; }
  
</style>
</head>
<body>
  <div class="board">
    <section class="pane light bg-background text-foreground">
      <div class="pane-tag">Light</div>
      <div class="stack">
        <p class="cap">variants</p>
        <div class="row">
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap bg-primary text-primary-foreground border-transparent">Default</span>
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap bg-secondary text-secondary-foreground border-transparent">Secondary</span>
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap bg-destructive text-white border-transparent">Destructive</span>
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap text-foreground">Outline</span>
        </div>
      </div>
    </section>
    <section class="pane dark bg-background text-foreground">
      <div class="pane-tag">Dark</div>
      <div class="stack">
        <p class="cap">variants</p>
        <div class="row">
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap bg-primary text-primary-foreground border-transparent">Default</span>
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap bg-secondary text-secondary-foreground border-transparent">Secondary</span>
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap bg-destructive text-white border-transparent">Destructive</span>
      <span class="inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap text-foreground">Outline</span>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
