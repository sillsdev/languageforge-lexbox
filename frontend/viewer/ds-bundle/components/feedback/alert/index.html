<!-- @dsCard group="Feedback" name="Alert" subtitle="default · destructive" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FW Lite — Alert</title>
<link rel="stylesheet" href="../../../styles.css">
<style>
  html, body { margin: 0; }
  .board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: color-mix(in oklab, var(--border) 70%, transparent); min-height: 100%; }
  @media (max-width: 720px) { .board { grid-template-columns: 1fr; } }
  .pane { position: relative; padding: 2rem 1.75rem; }
  .pane-tag { position: absolute; top: .6rem; right: .75rem; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; opacity: .5; }
  .row { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: .9rem; }
  .cap { font-size: 11px; opacity: .55; margin: 0 0 .35rem; }
  
</style>
</head>
<body>
  <div class="board">
    <section class="pane light bg-background text-foreground">
      <div class="pane-tag">Light</div>
      <div class="stack" style="max-width:26rem">
        <div class="cap">default</div>
        <div class="relative grid w-full grid-cols-[0_1fr] items-start gap-y-0.5 rounded-lg border px-4 py-3 text-sm bg-card text-card-foreground" role="alert">
          <div class="col-start-2 font-medium">Project up to date</div>
          <div class="col-start-2 text-muted-foreground">No pending changes to send or receive.</div>
        </div>
        <div class="cap">destructive</div>
        <div class="relative grid w-full grid-cols-[0_1fr] items-start gap-y-0.5 rounded-lg border px-4 py-3 text-sm text-destructive-foreground bg-destructive" role="alert">
          <div class="col-start-2 font-medium">Sync failed</div>
          <div class="col-start-2 opacity-90">Could not reach the server. Retrying…</div>
        </div>
      </div>
    </section>
    <section class="pane dark bg-background text-foreground">
      <div class="pane-tag">Dark</div>
      <div class="stack" style="max-width:26rem">
        <div class="cap">default</div>
        <div class="relative grid w-full grid-cols-[0_1fr] items-start gap-y-0.5 rounded-lg border px-4 py-3 text-sm bg-card text-card-foreground" role="alert">
          <div class="col-start-2 font-medium">Project up to date</div>
          <div class="col-start-2 text-muted-foreground">No pending changes to send or receive.</div>
        </div>
        <div class="cap">destructive</div>
        <div class="relative grid w-full grid-cols-[0_1fr] items-start gap-y-0.5 rounded-lg border px-4 py-3 text-sm text-destructive-foreground bg-destructive" role="alert">
          <div class="col-start-2 font-medium">Sync failed</div>
          <div class="col-start-2 opacity-90">Could not reach the server. Retrying…</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
