<!-- @dsCard group="Forms" name="Label" subtitle="form field label" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FW Lite — Label</title>
<link rel="stylesheet" href="../../../styles.css">
<style>
  html, body { margin: 0; }
  .board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: color-mix(in oklab, var(--border) 70%, transparent); min-height: 100%; }
  @media (max-width: 720px) { .board { grid-template-columns: 1fr; } }
  .pane { position: relative; padding: 2rem 1.75rem; }
  .pane-tag { position: absolute; top: .6rem; right: .75rem; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; opacity: .5; }
  .row { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: .9rem; }
  .cap { font-size: 11px; opacity: .55; margin: 0 0 .35rem; }
  
</style>
</head>
<body>
  <div class="board">
    <section class="pane light bg-background text-foreground">
      <div class="pane-tag">Light</div>
      <div class="stack" style="max-width:22rem">
        <div>
          <label class="flex items-center gap-2 text-sm leading-none font-medium select-none" style="margin-bottom:.4rem">Gloss</label>
          <input class="font-normal border-input bg-background dark:bg-input/30 placeholder:text-muted-foreground flex h-10 w-full min-w-0 rounded-md border px-3 py-2 text-base shadow-xs transition-[color,box-shadow] outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] disabled:cursor-not-allowed disabled:opacity-50 md:text-sm" placeholder="a short definition">
        </div>
      </div>
    </section>
    <section class="pane dark bg-background text-foreground">
      <div class="pane-tag">Dark</div>
      <div class="stack" style="max-width:22rem">
        <div>
          <label class="flex items-center gap-2 text-sm leading-none font-medium select-none" style="margin-bottom:.4rem">Gloss</label>
          <input class="font-normal border-input bg-background dark:bg-input/30 placeholder:text-muted-foreground flex h-10 w-full min-w-0 rounded-md border px-3 py-2 text-base shadow-xs transition-[color,box-shadow] outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] disabled:cursor-not-allowed disabled:opacity-50 md:text-sm" placeholder="a short definition">
        </div>
      </div>
    </section>
  </div>
</body>
</html>
