<!-- @dsCard group="Layouts" name="Master-detail" subtitle="entries list + entry editor · resizable" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FW Lite — Master-detail</title>
<link rel="stylesheet" href="../../../styles.css">
<style>
  html, body { margin: 0; }
  .board { display: flex; flex-direction: column; gap: 1px; background: color-mix(in oklab, var(--border) 70%, transparent); }
  .pane { position: relative; padding: 1.5rem; }
  .pane-tag { position: absolute; top: .5rem; right: .7rem; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; opacity: .45; z-index:2; }
  .shell { display: grid; height: 460px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .muted { color: var(--muted-foreground); }
  .ph { border: 1px dashed color-mix(in oklab, var(--border) 90%, transparent); border-radius: var(--radius); }
  
</style>
</head>
<body>
  <div class="board">
    <section class="pane light bg-background text-foreground">
      <div class="pane-tag">Light</div>
      <p class="cap muted" style="font-size:11px;margin:0 0 .6rem">list pane · resizable divider · detail pane</p>

          </div>

          <button class="w-full text-start rounded-md p-3 bg-accent text-accent-foreground">
            <div class="flex justify-between items-end gap-2">
              <div class="min-w-0">
                <div class="font-semibold truncate">Apfel</div>
                <div class="text-sm muted line-clamp-2">fruit with red, yellow, or green skin</div>
              </div>
              <span class="inline-flex items-center rounded-full border border-transparent bg-secondary text-secondary-foreground px-2 py-0.5 text-xs font-medium shrink-0">Noun</span>
            </div>
