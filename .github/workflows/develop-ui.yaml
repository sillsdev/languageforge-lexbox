name: Develop UI CI/CD
on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/lexbox-ui.yaml'
      - '.github/workflows/deploy.yaml'
    branches:
      - develop
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/lexbox-ui.yaml'
      - '.github/workflows/deploy.yaml'
    branches:
      - develop
jobs:
  set-version:
    name: Set Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.setVersion.outputs.VERSION }}
    steps:
      - name: Set Version
        id: setVersion
        # set version to date in vYYYY-MM-DD-commitSha format
        run: |
          shortSha=$(echo ${{ github.sha }} | cut -c1-8)
          echo "VERSION=v$(date --rfc-3339=date)-$shortSha" >> ${GITHUB_OUTPUT}
  build-ui:
    name: Build UI
    needs: set-version
    uses: ./.github/workflows/lexbox-ui.yaml
    with:
      version: ${{ needs.set-version.outputs.version }}
  deploy-api:
    name: Deploy API
    if: ${{github.ref == 'refs/heads/develop'}}
    needs: [ build-ui, set-version ]
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      version: ${{ needs.set-version.outputs.version }}
      image: 'ghcr.io/sillsdev/lexbox-ui'
      k8s-environment: develop
      deploy-domain: lexbox.dev.languagetechnology.org

  check-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: 'frontend/package.json'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: './frontend/package.json'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'
      - run: pnpm install
      - run: pnpm svelte-kit sync # generate frontend/.svelte-kit, so the viewer can build 🤔
      - run: pnpm run -r build # We need code/types generated by the build (e.g. gql/generated)
      - name: Svelte-Check PR Annotator
        uses: ./.github/actions/svelte-check-problem-matcher
      - id: svelte_check
        #using workspace package.json as a hack, github problem matcher requires the fromPath to match a file not the folder of the workspace
        run: pnpm run -r --no-bail --parallel --aggregate-output --reporter-hide-prefix check --output machine --workspace package.json
      - run: pnpm run -r --no-bail --parallel --aggregate-output lint:report
        if: ${{ always() && steps.svelte_check.outcome != 'cancelled' }}
      - name: Annotate Code Linting Results
        uses: ataylorme/eslint-annotate-action@d57a1193d4c59cbfbf3f86c271f42612f9dbd9e9 # 3.0.0
        if: always()
        with:
          only-pr-files: false
          report-json: |
            ./frontend/eslint_report.json
            ./frontend/viewer/eslint_report.json
