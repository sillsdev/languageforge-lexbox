name: FieldWorks Lite
on:
  workflow_dispatch:
  push:
    paths:
      - 'backend/FwLite/**'
      - 'backend/Directory.Packages.props'
      - 'backend/Harmony*.props'
      - 'frontend/viewer/**'
      - '.github/workflows/fw-lite.yaml'
      - 'FwLiteCore.slnf'
      - 'FwLiteOnly.slnf'
    branches:
      - develop
      - main
  pull_request:
    paths:
      - 'backend/FwLite/**'
      - 'backend/Directory.Packages.props'
      - 'backend/Harmony*.props'
      - 'frontend/viewer/**'
      - '.github/workflows/fw-lite.yaml'
      - 'FwLiteCore.slnf'
      - 'FwLiteOnly.slnf'
    branches:
      - develop
      - main
      - feat/sync-morph-types #just for now ensure PRs to this branch have checks run

# Only cancel superseded PR runs; never cancel release builds triggered by a push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  VIEWER_BUILD_OUTPUT_DIR: backend/FwLite/FwLiteShared/wwwroot/viewer
jobs:
  build-and-test:
    name: Build FW Lite and run tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.setVersion.outputs.VERSION }}
      semver-version: ${{ steps.setVersion.outputs.SEMVER_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/Directory.Packages.props', 'backend/Harmony*.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version
        id: setVersion
        shell: bash
        # set version to date in vYYYY-MM-DD-commitSha format, and semver version to YYYY.MM.DD
        run: |
          shortSha=$(echo ${{ github.sha }} | cut -c1-8)
          echo "VERSION=v$(date --rfc-3339=date)-$shortSha" >> ${GITHUB_OUTPUT}
          echo "SEMVER_VERSION=$(date +%Y.%-m.%-d)" >> ${GITHUB_OUTPUT}

      - name: Dotnet build
        # FwLiteCore.slnf omits MAUI projects — those build and test on publish-win (Windows).
        run: dotnet build FwLiteCore.slnf -p:BuildAndroid=false

      - name: Check for pending EF model changes
        run: task fw-lite:has-pending-model-changes -- --no-build

      - name: Check for stale generated TypeScript types
        run: task fw-lite:has-stale-generated-types -- --no-build

      - name: Set a non-UTC timezone so timezone bugs are observable
        # Hosted runners default to UTC, which hides date bugs: the error equals the local UTC
        # offset, which is zero on UTC (see #2092). Eastern is non-UTC, observes DST, and has a
        # negative offset, so date round-trips run the way real users actually hit them.
        run: sudo timedatectl set-timezone America/New_York

      - name: Dotnet test
        # Benchmarks run in a separate Release-mode job — see `benchmark` below.
        # MAUI tests run in publish-win. `trx` logger writes result files for the TestHistory
        # upload below; --results-directory collects one .trx per test project into a single folder.
        run: dotnet test FwLiteCore.slnf --logger GitHubActions --logger trx --results-directory "${{ github.workspace }}/TestResults" --no-build -p:BuildAndroid=false --filter "Category!=Benchmark"

      - name: Publish test results to TestHistory
        if: always()
        continue-on-error: true # telemetry only — a TestHistory outage must not fail the build
        uses: hahn-kev/TestHistory/.github/actions/upload-results@e5fc439cd7644a145c7553bc3b0077aa643aef8d # master
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_FWLITE_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_API_TOKEN }}
          files: TestResults/**/*.trx
          label: FW Lite .NET
          on-no-files: ignore # build may fail before any tests run

  benchmark:
    name: Run FW Lite sync benchmarks
    # Auto-runs post-merge on develop only — too slow and variance-prone to gate every PR (revisit
    # if they get fast enough). Also runnable on demand via workflow_dispatch to baseline a branch.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    # Benchmarks take tens of minutes; 60 leaves headroom for hosted-runner variance.
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: true
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Dotnet build (Release)
        run: dotnet build backend/FwLite/FwLiteProjectSync.Tests/FwLiteProjectSync.Tests.csproj -c Release

      - name: Dotnet test (benchmarks)
        run: dotnet test backend/FwLite/FwLiteProjectSync.Tests/FwLiteProjectSync.Tests.csproj -c Release --logger GitHubActions --no-build --filter "Category=Benchmark"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: benchmark-results
          path: '**/BenchmarkDotNet.Artifacts/**'
          # warn, not error: with if: always() a build/crash failure emits no artifacts, and the real
          # failure is already red elsewhere — a threshold-assertion failure still writes artifacts first.
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: 'frontend/package.json'
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: './frontend/package.json'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare frontend
        working-directory: frontend
        run: |
          pnpm install
      - name: Ensure all i18n strings have been extracted
        working-directory: frontend/viewer
        shell: bash
        run: |
          set -e
          # GHA sets -o pipefail when shell is bash but we want to turn it off
          set +o pipefail
          rm -f src/locales/en.po.old
          cp src/locales/en.po src/locales/en.po.old
          pnpm i18n:extract
          DIFFCOUNT=$(diff -u src/locales/en.po{.old,} | grep '+msgid' | wc -l)
          if [ $DIFFCOUNT -gt 0 ]; then
            # Unextracted strings found, fail the build
            echo '***'
            echo $DIFFCOUNT unextracted strings found:
            echo '***'
            diff -u src/locales/en.po{.old,} | grep '+msgid' | cut -c2-
            echo '***'
            echo Please run pnpm i18n:extract
            exit 1
          fi
          rm -f src/locales/en.po.old
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: pnpm exec playwright install-deps
      - name: Run UI tests
        working-directory: frontend/viewer
        run: task test:ui-standalone
      - name: Publish test results to TestHistory
        if: always() # run even when the UI tests above failed
        continue-on-error: true # telemetry only — a TestHistory outage must not fail the build
        uses: hahn-kev/TestHistory/.github/actions/upload-results@e5fc439cd7644a145c7553bc3b0077aa643aef8d # master
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_FWLITE_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_API_TOKEN }}
          files: frontend/viewer/tests/ui/test-results/results.xml
          label: FW Lite Viewer UI
          on-no-files: ignore

      - name: Build viewer
        working-directory: frontend/viewer
        run: pnpm run build

      # Disabled so we can format in a seperate commit and ignore it in git blame
      # - name: Check code formatting with Prettier
      #   working-directory: frontend/viewer
      #   run: pnpm run format:check

      - name: Upload viewer artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-viewer-js
          if-no-files-found: error
          path: ${{ env.VIEWER_BUILD_OUTPUT_DIR }}

  frontend-component-unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: 'frontend/package.json'
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: './frontend/package.json'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'
      - name: Prepare frontend
        working-directory: frontend
        run: |
          pnpm install
        # vitest is configured to use playwright for stories and other browser-based tests
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend/viewer
        run: pnpm exec playwright install --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend/viewer
        run: pnpm exec playwright install-deps
      - name: vitest
        working-directory: frontend/viewer
        run: pnpm run test --retry=2 --reporter=default --reporter=junit --outputFile.junit=test-results/vitest-results.xml
      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@8885e273a4343cd7b48eaa72428dea0c3067ea98 # v2.14.0
        if: always()
        with:
          check_name: UI unit Tests
          files: ./frontend/viewer/test-results/*.xml
          action_fail_on_inconclusive: true
          comment_mode: off
      - name: Publish test results to TestHistory
        if: always()
        continue-on-error: true # telemetry only — a TestHistory outage must not fail the build
        uses: hahn-kev/TestHistory/.github/actions/upload-results@e5fc439cd7644a145c7553bc3b0077aa643aef8d # master
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_FWLITE_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_API_TOKEN }}
          files: frontend/viewer/test-results/vitest-results.xml
          label: FW Lite Viewer unit
          on-no-files: ignore

  publish-mac:
    name: Publish FW Lite app for Mac
    needs: [build-and-test, frontend]
    timeout-minutes: 30
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-viewer-js
          path: ${{ env.VIEWER_BUILD_OUTPUT_DIR }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Dotnet build
        working-directory: backend/FwLite/FwLiteWeb
        run: dotnet build --configuration Release

      - name: Publish OSX
        working-directory: backend/FwLite/FwLiteWeb
        run: dotnet publish -r osx-x64 --artifacts-path ../artifacts -p:Version=${{ needs.build-and-test.outputs.semver-version }}

      - name: Publish OSX ARM
        working-directory: backend/FwLite/FwLiteWeb
        run: dotnet publish -r osx-arm64 --artifacts-path ../artifacts -p:Version=${{ needs.build-and-test.outputs.semver-version }}
#todo sign the app
      - name: Upload local web app artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-web-mac
          if-no-files-found: error
          path: backend/FwLite/artifacts/publish/FwLiteWeb/*

  publish-linux:
    name: Publish FW Lite app for Linux
    needs: [ build-and-test, frontend ]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-viewer-js
          path: ${{ env.VIEWER_BUILD_OUTPUT_DIR }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Publish Linux
        working-directory: backend/FwLite/FwLiteWeb
        run: |
            dotnet publish -r linux-x64 --artifacts-path ../artifacts -p:PublishSingleFile=true -p:Version=${{ needs.build-and-test.outputs.semver-version }}
            dotnet publish -r linux-arm64 --artifacts-path ../artifacts -p:PublishSingleFile=true -p:Version=${{ needs.build-and-test.outputs.semver-version }}

      - name: Test Linux executable
        working-directory: backend/FwLite/artifacts/publish/FwLiteWeb/release_linux-x64
        run: |
            set +e
            chmod +x ./FwLiteWeb
            output=$(timeout 10s ./FwLiteWeb 2>&1)
            exit_code=$?
            if [ $exit_code -eq 124 ] || [ $exit_code -eq 0 ]; then
              echo "✅ Linux executable ran without crashing for 10s"
            else
              echo "❌ Linux executable exited with code $exit_code"
              echo "$output"
              exit 1
            fi

      - name: Upload FWLite Linux artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-web-linux
          if-no-files-found: error
          path: backend/FwLite/artifacts/publish/FwLiteWeb/*

  publish-android:
    name: Publish FW Lite app for Android
    needs: [ build-and-test, frontend ]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-viewer-js
          path: ${{ env.VIEWER_BUILD_OUTPUT_DIR }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Setup Maui
        run: dotnet workload install maui-android
      - name: Decode Android Keystore
        id: decodeKeystore
        env:
          KEYSTORE_BASE64: ${{ secrets.FW_LITE_KEYSTORE_BASE64 }}
        run: |
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/keystore.jks" >> ${GITHUB_OUTPUT}
          base64 -d <<< "$KEYSTORE_BASE64" > ${RUNNER_TEMP}/keystore.jks

      - name: Publish Android
        working-directory: backend/FwLite/FwLiteMaui
        env:
          KEYSTORE_PATH: ${{ steps.decodeKeystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_PASS: ${{ secrets.FW_LITE_KEYSTORE_PASS }}
          KEYSTORE_ALIAS: ${{ vars.FW_LITE_KEYSTORE_UPLOAD_KEY_ALIAS }}
        run: |
          dotnet publish -f net10.0-android -p:BuildApple=false --artifacts-path ../artifacts \
            -p:ApplicationDisplayVersion=${{ needs.build-and-test.outputs.semver-version }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:InformationalVersion=${{ needs.build-and-test.outputs.version }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=${KEYSTORE_PATH} \
            -p:AndroidSigningKeyPass=env:KEYSTORE_PASS \
            -p:AndroidSigningStorePass=env:KEYSTORE_PASS \
            -p:AndroidSigningKeyAlias=${KEYSTORE_ALIAS}
          rm ${KEYSTORE_PATH}

      - name: Upload FWLite App artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-android
          if-no-files-found: error
#          path looks like this: backend/FwLite/artifacts/publish/FwLiteMaui/release_net10.0-android/org.sil.fwlitemaui-signed.apk
          path: backend/FwLite/artifacts/publish/FwLiteMaui/release_net10.0-android/*

  publish-win:
    name: Publish FW Lite app for Windows
    needs: [ build-and-test, frontend ]
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-viewer-js
          path: ${{ env.VIEWER_BUILD_OUTPUT_DIR }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/Directory.Packages.props', 'backend/Harmony*.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup Maui
        run: dotnet workload install maui-windows

      - name: Build MAUI tests
        run: dotnet build backend/FwLite/FwLiteMaui.Tests/FwLiteMaui.Tests.csproj -p:BuildAndroid=false

      - name: Test MAUI
        run: dotnet test backend/FwLite/FwLiteMaui.Tests/FwLiteMaui.Tests.csproj --logger GitHubActions --logger trx --results-directory "${{ github.workspace }}/TestResults" --no-build -p:BuildAndroid=false

      - name: Publish MAUI test results to TestHistory
        if: always()
        continue-on-error: true # telemetry only
        uses: hahn-kev/TestHistory/.github/actions/upload-results@e5fc439cd7644a145c7553bc3b0077aa643aef8d # master
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_FWLITE_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_API_TOKEN }}
          files: TestResults/**/*.trx
          label: FW Lite MAUI Windows
          on-no-files: ignore
      - name: Publish Windows MAUI portable app
        working-directory: backend/FwLite/FwLiteMaui
        run: |
          dotnet publish -f net10.0-windows10.0.19041.0 -p:BuildAndroid=false --artifacts-path ../artifacts -p:WindowsPackageType=None -p:ApplicationDisplayVersion=${{ needs.build-and-test.outputs.semver-version }} -p:InformationalVersion=${{ needs.build-and-test.outputs.version }}
          mkdir -p ../artifacts/sign/portable
          cp -r ../artifacts/publish/FwLiteMaui/* ../artifacts/sign/portable/

      - name: Publish Windows MAUI msix app
        working-directory: backend/FwLite/FwLiteMaui
        run: |
          # AppxPackageDir is the MSIX-targets equivalent of --artifacts-path: without it
          # MAUI 10 writes AppPackages to $(MSBuildProjectDirectory)/AppPackages, ignoring
          # --artifacts-path. Redirect it under artifacts/ so everything lives in one tree.
          dotnet publish -f net10.0-windows10.0.19041.0 -p:BuildAndroid=false --artifacts-path ../artifacts -p:AppxPackageDir=../artifacts/AppPackages/ -p:ApplicationDisplayVersion=${{ needs.build-and-test.outputs.semver-version }} -p:InformationalVersion=${{ needs.build-and-test.outputs.version }}
          mkdir -p ../artifacts/msix
          cp ../artifacts/AppPackages/*/*.msix ../artifacts/msix/

      - name: Bundle MSIX
        working-directory: backend/FwLite/artifacts/msix
        shell: pwsh
        run: |
          $SdkVersion = '10.0.26100.0'
          $Architecture = 'x86'
          $sdkToolsPath = Join-Path -Path 'C:\Program Files (x86)\Windows Kits\10\bin' -ChildPath $SdkVersion -AdditionalChildPath $Architecture
          $env:Path += ";$sdkToolsPath"

          MakeAppx.exe bundle /v /bv ${{ needs.build-and-test.outputs.semver-version }}.1 /d . /p ../sign/FwLiteMaui.msixbundle

      - name: Sign with Trusted Signing
        if: ${{ github.ref_name == 'develop' || github.ref_name == 'main' }}
        uses: sillsdev/codesign/trusted-signing-action@v3
        with:
          credentials: ${{ secrets.TRUSTED_SIGNING_CREDENTIALS }}
          files-folder: ${{ github.workspace }}/backend/FwLite/artifacts/sign
          files-folder-filter: msixbundle,exe
          files-folder-recurse: true
          files-folder-depth: 4
          description:  'Release for version ${{ needs.build-and-test.outputs.version }} from branch ${{ github.ref_name || github.head_ref }}'
          description-url: 'https://github.com/sillsdev/languageforge-lexbox'

      - name: Upload FWLite Portable
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-portable
          if-no-files-found: error
          path: backend/FwLite/artifacts/sign/portable/*

      - name: Upload FWLite MSIX
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-msix
          if-no-files-found: error
          path: backend/FwLite/artifacts/sign/*.msixbundle

  create-release:
    if: ${{ github.ref_name == 'main' }}
    environment:
      name: production
      url: https://lexbox.org/fw-lite
    name: Create Release
    needs: [ build-and-test, publish-win, publish-linux, publish-mac, publish-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-msix
          path: fw-lite-msix
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-portable
          path: fw-lite-portable
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-web-linux
          path: fw-lite-web-linux
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-android
          path: fw-lite-android

      - name: Zip artifacts
        run: |
          zip -r fw-lite-portable.zip fw-lite-portable
          chmod +x fw-lite-web-linux/*/FwLiteWeb fw-lite-web-linux/*/*.sh
          zip -r fw-lite-web-linux.zip fw-lite-web-linux
      - name: Rename Installer
        run: |
          mv fw-lite-msix/FwLiteMaui.msixbundle fw-lite-msix/FieldWorksLiteInstaller.msixbundle

      - name: Create Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda #v2.2.1
        with:
          tag_name: ${{ needs.build-and-test.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            fw-lite-msix/*
            fw-lite-portable.zip
            fw-lite-web-linux.zip
            fw-lite-android/*.apk
            fw-lite-android/*.aab

      - name: Invalidate Lexbox Release endpoint
        continue-on-error: true
        run: |
          sleep 10
          curl -X POST https://lexbox.org/api/fwlite-release/new-release


  e2e-test:
    name: E2E Tests
    needs: [frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FW_LITE_BINARY_PATH: ${{ github.workspace }}/backend/FwLite/artifacts/publish/FwLiteWeb/release_linux-x64/FwLiteWeb
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: true
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: fw-lite-viewer-js
          path: ${{ env.VIEWER_BUILD_OUTPUT_DIR }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.x'
      - name: Publish FwLiteWeb (linux-x64)
        working-directory: backend/FwLite/FwLiteWeb
        run: dotnet publish -r linux-x64 --artifacts-path ../artifacts -p:PublishSingleFile=true

      - name: set execute permissions
        shell: bash
        run: chmod +x ${{ env.FW_LITE_BINARY_PATH }}

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 #v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: 'frontend/package.json'
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: './frontend/package.json'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install
      - name: Test FwLite launcher
        working-directory: frontend/viewer
        # Call vitest directly (not `task test:launcher`) to add the junit reporter for the
        # TestHistory upload below; the task forwards no CLI args. Mirrors the vitest job above.
        run: pnpm run test:launcher --run --reporter=default --reporter=junit --outputFile.junit=test-results/launcher-results.xml
      - name: Publish launcher test results to TestHistory
        if: always() # run even when the launcher tests above failed
        continue-on-error: true # telemetry only — a TestHistory outage must not fail the build
        uses: hahn-kev/TestHistory/.github/actions/upload-results@e5fc439cd7644a145c7553bc3b0077aa643aef8d # master
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_FWLITE_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_API_TOKEN }}
          files: frontend/viewer/test-results/launcher-results.xml
          label: FW Lite Launcher
          on-no-files: ignore

      - uses: ./.github/actions/setup-k8s
        with:
          lexbox-api-tag: develop
          ingress-controller-port: '6579' # http; only used by the action's own curl-verify step
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # MSAL refuses any non-https authority. ingress-nginx serves a snake-oil
      # cert that FwLite trusts via --environment Development and playwright via
      # ignoreHTTPSErrors.
      - name: Forward ingress HTTPS port
        shell: bash
        run: |
          kubectl port-forward service/ingress-nginx-controller 6580:443 -n languagedepot >/tmp/https-port-forward.log 2>&1 &
          # Wait for the port-forward to actually be listening
          for i in $(seq 1 30); do
            if curl -sk https://localhost:6580 >/dev/null 2>&1; then
              echo "✅ HTTPS port-forward ready on :6580"
              exit 0
            fi
            sleep 1
          done
          echo "❌ HTTPS port-forward did not become ready"
          cat /tmp/https-port-forward.log
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend/viewer
        run: pnpm exec playwright install --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend/viewer
        run: pnpm exec playwright install-deps

      - name: Run E2E tests
        working-directory: frontend/viewer
        env:
          TEST_SERVER_PROTOCOL: https
          TEST_SERVER_PORT: 6580
        run: task test:e2e
      - name: Publish E2E test results to TestHistory
        if: always() # run even when the E2E tests above failed
        continue-on-error: true # telemetry only — a TestHistory outage must not fail the build
        uses: hahn-kev/TestHistory/.github/actions/upload-results@e5fc439cd7644a145c7553bc3b0077aa643aef8d # master
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_FWLITE_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_API_TOKEN }}
          files: frontend/viewer/tests/e2e/test-results/e2e-results.xml
          label: FW Lite E2E
          on-no-files: ignore

      - name: Upload Playwright results/traces (on failure)
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-e2e-test-results
          if-no-files-found: ignore
          path: frontend/viewer/tests/e2e/test-results/

      - name: Capture k8s pod logs (on failure)
        if: failure()
        shell: bash
        run: |
          mkdir -p k8s-logs
          for app in lexbox ui hg db fw-headless; do
            kubectl describe pods -l "app=${app}" -n languagedepot > k8s-logs/describe-${app}.txt 2>&1 || true
            kubectl logs -l "app=${app}" -n languagedepot --prefix --all-containers --tail=-1 > k8s-logs/logs-${app}.txt 2>&1 || true
          done
          kubectl logs -l 'app.kubernetes.io/name=ingress-nginx' -n languagedepot --prefix --all-containers --tail=-1 > k8s-logs/logs-ingress.txt 2>&1 || true

      - name: Upload k8s logs (on failure)
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fw-lite-e2e-k8s-logs
          if-no-files-found: ignore
          path: k8s-logs/*.txt
