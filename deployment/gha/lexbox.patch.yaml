apiVersion: apps/v1
kind: Deployment
metadata:
  name: lexbox
  namespace: languagedepot
spec:
  template:
    spec:
      containers:
        - name: lexbox-api
          env:
            - name: Email__BaseUrl
              value: "http://localhost:6579"
            # Trust the kind cluster's pod network so X-Forwarded-Proto from the
            # ingress-nginx controller is honored — otherwise lexbox sees the request
            # as HTTP and emits HTTP URLs in /.well-known/openid-configuration, which
            # breaks the FwLite OAuth flow over the HTTPS port-forward used in CI.
            - name: ForwardedHeadersOptions__KnownNetworks__0
              value: "0.0.0.0/0"
          volumeMounts:
            - mountPath: /frontend
              name: gql-schema
            - mountPath: /var/www
              name: www
        - name: otel-collector
          env: #don't try to export to honeycomb
            - name: COLLECTOR_CONFIG_OVERRIDE
              value: |
                exporters:
                  otlp/aspire:
                    endpoint: localhost:18889
                    tls:
                      insecure: true
                service:
                  pipelines:
                    traces:
                      exporters: [otlp/aspire]
                    metrics:
                      exporters: [otlp/aspire]
                    logs:
                      exporters: [otlp/aspire]
      volumes:
        - name: gql-schema
          emptyDir: {}
        - name: www
          emptyDir: {}
