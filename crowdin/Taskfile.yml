# yaml-language-server: $schema=https://taskfile.dev/schema.json
# https://taskfile.dev

version: '3'

tasks:
  crowdin:
    dotenv: [.crowdin-env.local]
    cmd: crowdin {{.CLI_ARGS}} -b develop

  pull:
    desc: Pull translations from Crowdin (does not modify the working tree directly; use the /crowdin-merge skill for the full inbound flow)
    cmd: task crowdin -- pull

  i18n:
    dir: ../frontend/viewer
    cmds:
      - task i18n

# NOTE: `crowdin push sources` is not wrapped as a named task because it is
# only needed after context-comment additions to en.po — not part of the daily
# flow. Crowdin's GitHub integration is export-only (translation push to GitHub);
# it does NOT pull sources from GitHub. To get new `#.` translator context into
# Crowdin's DB, run `task crowdin -- push sources`. Verified safe: no MT auto-
# rerun, no string deletion, just metadata updates.
#
# The /crowdin-merge skill calls `task crowdin -- push translations -l <locale>`
# for any locale it has filled or corrected.
